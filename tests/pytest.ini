[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --tb=short
    -x
markers =
    unit: Pure unit tests (no server)
    api: HTTP integration against test stack
    realtime: WebSocket integration
    mobile: Mobile lifecycle / reconcile simulation
    stress: High-volume operational stress
    migration: Schema and Alembic authority
    critical: Pilot-blocking — failure stops deployment

filterwarnings =
    ignore::DeprecationWarning
